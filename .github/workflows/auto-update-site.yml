name: Auto update site

on:
  push:
    paths:
      - ".github/workflows/auto-update-site.yml"
      - "New project 2/tools/update-latest-info.mjs"
      - "New project 2/meta-overrides.js"
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-update-site
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update latest info
        run: node "New project 2/tools/update-latest-info.mjs"

      - name: Commit updated site files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto update site info"
          file_pattern: "New project 2/index.html New project 2/data/latest-updates.json New project 2/data/wzstats-meta.json New project 2/data/cod-weapons.json New project 2/data/mw4-watch.json"
