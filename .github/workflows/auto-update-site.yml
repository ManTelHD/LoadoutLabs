name: Auto update site

on:
  push:
    paths:
      - ".github/workflows/auto-update-site.yml"
      - "New project 2/tools/update-latest-info.mjs"
      - "New project 2/meta-fast.js"
      - "New project 2/loadout-builds.js"
      - "New project 2/season4.js"
      - "New project 2/data/season-watch.json"
      - "New project 2/meta-overrides.css"
      - "New project 2/meta-overrides.js"
      - "netlify-inject-meta-overrides.js"
  schedule:
    # WZStats can update after the evening check, so keep the site fresh hourly.
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: site-content-writes
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Sync latest main
        run: git pull --ff-only origin main

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update latest info
        run: node "New project 2/tools/update-latest-info.mjs"

      - name: Refresh site assets
        run: |
          SITE_ASSET_VERSION="auto-$(date -u +%Y%m%d%H%M%S)" node netlify-inject-meta-overrides.js

      - name: Validate generated site data
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const meta = JSON.parse(fs.readFileSync('New project 2/data/wzstats-meta.json', 'utf8'));
          const html = fs.readFileSync('New project 2/index.html', 'utf8');
          const warzoneItems = meta.warzoneRanked?.items || [];
          if (!warzoneItems.length) throw new Error('No Warzone WZStats items were generated.');
          if (!meta.generatedAt || !meta.generatedAtLabel) throw new Error('Generated timestamp is missing.');
          if (!html.includes('window.__loadoutLabMetaVersion')) throw new Error('Live cache-bust patch is missing from index.html.');
          if (!/meta-fast\.js\?v=auto-/.test(html)) throw new Error('meta-fast.js was not versioned with the current auto-update id.');
          console.log(`Validated ${warzoneItems.length} Warzone meta items; #1 is ${warzoneItems[0].name}.`);
          NODE

      - name: Commit updated site files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            "New project 2/index.html" \
            "New project 2/data/latest-updates.json" \
            "New project 2/data/wzstats-meta.json" \
            "New project 2/data/cod-weapons.json" \
            "New project 2/data/mw4-watch.json" \
            "New project 2/data/season-watch.json"
          if git diff --cached --quiet; then
            echo "No site data changes to commit."
            exit 0
          fi

          git commit -m "chore: auto update site info"

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "Updated site files pushed."
              exit 0
            fi

            echo "Push failed; rebasing onto latest main before retry $attempt/3."
            git fetch origin main
            git rebase origin/main
            sleep 5
          done

          echo "Failed to push updated site files after 3 attempts."
          exit 1
