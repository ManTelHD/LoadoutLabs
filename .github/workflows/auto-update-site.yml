name: Auto update site

on:
  push:
    paths:
      - ".github/workflows/auto-update-site.yml"
      - "New project 2/tools/update-latest-info.mjs"
      - "New project 2/tools/validate-generated-site.mjs"
      - "New project 2/meta-fast.js"
      - "New project 2/loadout-builds.js"
      - "New project 2/loadout-build-supplements.js"
      - "New project 2/loadout-filter-fix.js"
      - "New project 2/loadout-card-finalizer.js"
      - "New project 2/loadout-image-fix.js"
      - "New project 2/loadout-mobile-details-polish.js"
      - "New project 2/loadout-mobile-filter-close.js"
      - "New project 2/season4.js"
      - "New project 2/data/season-watch.json"
      - "New project 2/meta-overrides.css"
      - "New project 2/meta-overrides.js"
      - "netlify-inject-meta-overrides.js"
  schedule:
    # WZStats can update after the evening check, so keep the site fresh hourly.
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: site-content-writes
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Sync latest main
        run: git pull --ff-only origin main

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update latest info
        run: node "New project 2/tools/update-latest-info.mjs"

      - name: Normalize WZStats ranks and scores
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const file = 'New project 2/data/wzstats-meta.json';
          const data = JSON.parse(fs.readFileSync(file, 'utf8'));

          function scoreFor(tier, position) {
            if (tier === 'META') return Math.max(94, 101 - position);
            if (tier === 'A') return Math.max(82, 92 - position);
            if (tier === 'B') return Math.max(72, 82 - position);
            if (tier === 'C') return Math.max(62, 72 - position);
            if (tier === 'D') return Math.max(52, 62 - position);
            return Math.max(50, 90 - position);
          }

          function normalizeList(list) {
            if (!list?.items?.length) return;
            list.items.forEach((item, index) => {
              const position = index + 1;
              const tier = item.tier || 'META';
              item.position = position;
              item.rankLabel = `${tier} #${position}`;
              item.score = scoreFor(tier, position);
              item.scoreLabel = String(item.score);
            });
          }

          normalizeList(data.warzoneRanked);
          normalizeList(data.bo7Ranked);
          fs.writeFileSync(file, `${JSON.stringify(data, null, 2)}\n`);
          NODE

      - name: Refresh site assets
        run: |
          SITE_ASSET_VERSION="auto-$(date -u +%Y%m%d%H%M%S)" node netlify-inject-meta-overrides.js

      - name: Validate generated site
        run: node "New project 2/tools/validate-generated-site.mjs"

      - name: Commit updated site files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            "New project 2/index.html" \
            "New project 2/data/latest-updates.json" \
            "New project 2/data/wzstats-meta.json" \
            "New project 2/data/cod-weapons.json" \
            "New project 2/data/mw4-watch.json" \
            "New project 2/data/season-watch.json"
          if git diff --cached --quiet; then
            echo "No site data changes to commit."
            exit 0
          fi

          git commit -m "chore: auto update site info"

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "Updated site files pushed."
              exit 0
            fi

            echo "Push failed; rebasing onto latest main before retry $attempt/3."
            git fetch origin main
            git rebase origin/main
            sleep 5
          done

          echo "Failed to push updated site files after 3 attempts."
          exit 1
