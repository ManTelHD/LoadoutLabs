name: Auto update site

on:
  push:
    paths:
      - ".github/workflows/auto-update-site.yml"
      - "New project 2/tools/update-latest-info.mjs"
      - "New project 2/meta-overrides.css"
      - "New project 2/meta-overrides.js"
      - "netlify-inject-meta-overrides.js"
  schedule:
    # 19:02 Europe/Berlin during daylight saving time (UTC+2)
    - cron: "2 17 * * *"
    # 19:02 Europe/Berlin during standard time (UTC+1)
    - cron: "2 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: site-content-writes
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check Berlin update window
        id: update-window
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run_update=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          berlin_offset="$(TZ=Europe/Berlin date +%z)"
          schedule="${{ github.event.schedule }}"

          if { [ "$schedule" = "2 17 * * *" ] && [ "$berlin_offset" = "+0200" ]; } || { [ "$schedule" = "2 18 * * *" ] && [ "$berlin_offset" = "+0100" ]; }; then
            echo "run_update=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_update=false" >> "$GITHUB_OUTPUT"
            echo "Skipping non-19:02 Europe/Berlin schedule ($schedule, offset $berlin_offset)."
          fi

      - name: Check out repository
        if: steps.update-window.outputs.run_update == 'true'
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Sync latest main
        if: steps.update-window.outputs.run_update == 'true'
        run: git pull --ff-only origin main

      - name: Set up Node
        if: steps.update-window.outputs.run_update == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update latest info
        if: steps.update-window.outputs.run_update == 'true'
        run: node "New project 2/tools/update-latest-info.mjs"

      - name: Refresh site assets
        if: steps.update-window.outputs.run_update == 'true'
        run: |
          SITE_ASSET_VERSION="auto-$(date -u +%Y%m%d%H%M%S)" node netlify-inject-meta-overrides.js

      - name: Commit updated site files
        if: steps.update-window.outputs.run_update == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            "New project 2/index.html" \
            "New project 2/data/latest-updates.json" \
            "New project 2/data/wzstats-meta.json" \
            "New project 2/data/cod-weapons.json" \
            "New project 2/data/mw4-watch.json"
          if git diff --cached --quiet; then
            echo "No site data changes to commit."
            exit 0
          fi

          git commit -m "chore: auto update site info"

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "Updated site files pushed."
              exit 0
            fi

            echo "Push failed; rebasing onto latest main before retry $attempt/3."
            git fetch origin main
            git rebase origin/main
            sleep 5
          done

          echo "Failed to push updated site files after 3 attempts."
          exit 1
