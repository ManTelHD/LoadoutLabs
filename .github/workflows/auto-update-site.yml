name: Auto update site

on:
  push:
    paths:
      - ".github/workflows/auto-update-site.yml"
      - "New project 2/tools/update-latest-info.mjs"
      - "New project 2/meta-overrides.css"
      - "New project 2/meta-overrides.js"
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-update-site
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Sync latest main
        run: git pull --ff-only origin main

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update latest info
        run: node "New project 2/tools/update-latest-info.mjs"

      - name: Bust site asset cache
        run: |
          node <<'NODE'
          const { readFileSync, writeFileSync } = require('node:fs');
          const path = 'New project 2/index.html';
          const version = '20260512-official1';
          let html = readFileSync(path, 'utf8');

          html = html
            .replace(/\s*<link rel="stylesheet" href="styles\.css(?:\?v=[^"]*)?">/g, '')
            .replace(/\s*<link rel="stylesheet" href="meta-overrides\.css(?:\?v=[^"]*)?">/g, '')
            .replace(/\s*<script src="script\.js(?:\?v=[^"]*)?"\s*><\/script>/g, '')
            .replace(/\s*<script src="meta-overrides\.js(?:\?v=[^"]*)?"\s*><\/script>/g, '');

          html = html.replace(
            /(<link\s+href="https:\/\/fonts\.googleapis\.com\/css2\?[^>]+rel="stylesheet"\s*>)/,
            `$1\n    <link rel="stylesheet" href="styles.css?v=${version}">\n    <link rel="stylesheet" href="meta-overrides.css?v=${version}">`
          );

          html = html.replace(
            /\s*<\/body>/,
            `\n    <script src="script.js?v=${version}"></script>\n    <script src="meta-overrides.js?v=${version}"></script>\n  </body>`
          );

          writeFileSync(path, html, 'utf8');
          NODE

      - name: Commit updated site files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            "New project 2/index.html" \
            "New project 2/data/latest-updates.json" \
            "New project 2/data/wzstats-meta.json" \
            "New project 2/data/cod-weapons.json" \
            "New project 2/data/mw4-watch.json"
          if git diff --cached --quiet; then
            echo "No site data changes to commit."
          else
            git commit -m "chore: auto update site info"
            git pull --rebase origin main
            git push
          fi
