name: Sync site override assets

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Inject override assets
        run: |
          node netlify-inject-meta-overrides.js

      - name: Commit synced page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "New project 2/index.html"
          if git diff --cached --quiet; then
            echo "No page sync needed."
          else
            git commit -m "Sync override assets into site HTML"
            git push
          fi
