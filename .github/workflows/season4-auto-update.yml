name: Auto update Season 4 watch

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: site-content-writes
  cancel-in-progress: false

jobs:
  update-season4:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Sync latest main
        run: git pull --ff-only origin main

      - name: Update Season 4 watch data
        run: node tools/update-season4-watch.js

      - name: Commit changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "New project 2/season4-click-rescue.js" netlify-inject-meta-overrides.js .nojekyll
          if git diff --cached --quiet; then
            echo "No Season 4 changes detected."
            exit 0
          fi

          git commit -m "Auto update Season 4 watch"

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "Season 4 watch changes pushed."
              exit 0
            fi

            echo "Push failed; rebasing onto latest main before retry $attempt/3."
            git fetch origin main
            git rebase origin/main
            sleep 5
          done

          echo "Failed to push Season 4 watch changes after 3 attempts."
          exit 1
