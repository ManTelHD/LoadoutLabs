name: Refresh Loadout Lab Meta Once

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/loadout-meta-refresh-once.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-meta:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh generated Loadout Lab data
        working-directory: New project 2
        run: node tools/update-latest-info.mjs

      - name: Patch current meta fallback copy
        working-directory: New project 2
        run: |
          node <<'NODE'
          const { readFileSync, writeFileSync } = require('node:fs');

          const scriptPath = 'script.js';
          let source = readFileSync(scriptPath, 'utf8');

          const replacements = [
            [
              /<span>Meta Update · 3\. Mai 2026<\/span>\s*<p><strong>WZStats live geprüft:<\/strong> MK\.78 ist #1 Langstrecke, Kogot-7 ist #1 Kurzstrecke, DS20 Mirage ist #2 Langstrecke und VST ist #2 Kurzstrecke\. <strong>Korrektur:<\/strong> MXR-17 ist aktuell A-Tier #8 Langstrecke, nicht Top-Meta\.<\/p>/,
              '<span>Meta Update · 12. Juni 2026</span>\n      <p><strong>WZStats live geprüft:</strong> DS20 Mirage ist #1, Carbon 57 #2, AK-27 #3, Dravec 45 #4, MXR-17 #5 und VST #6 in der aktuellen Warzone-Meta.</p>',
            ],
            [
              /<span>Meta Update · 3\. Mai 2026<\/span>\s*<p><strong>Buff:<\/strong> MXR-17 bekommt bessere Damage-Werte und bleibt als Anchor-AR interessanter\. <strong>Nerf außerhalb der Liste:<\/strong> 1911 verliert deutlich Reichweite\. <strong>Attachment-Buff:<\/strong> X9 Maverick Javelin Assembly bekommt bessere Projectile-Werte\. <strong>Neu:<\/strong> Siren, Katana und mehrere Weekly-Challenge-Aufsätze sind für Reloaded relevant\.<\/p>/,
              '<span>Meta Update · 12. Juni 2026</span>\n    <p><strong>BO7 Ranked:</strong> M15 MOD 0, MPC-25, Dravec 45, VS Recon und Jäger 45 bilden die aktuellen Top-Empfehlungen.</p>',
            ],
            [
              /\["Waffen-Balance", "WZStats führt MK\.78 als #1 Langstrecke, Kogot-7 als #1 Kurzstrecke, DS20 Mirage als #2 Langstrecke und VST als #2 Kurzstrecke\. MXR-17 wurde zwar gebufft, steht aktuell aber nur im A-Tier #8 Langstrecke\."\]/,
              '["Waffen-Balance", "WZStats führt DS20 Mirage, Carbon 57, AK-27, Dravec 45, MXR-17 und VST als aktuelle Warzone-Meta. BO7 Ranked führt M15 MOD 0, MPC-25, Dravec 45, VS Recon und Jäger 45."]',
            ],
          ];

          for (const [pattern, replacement] of replacements) {
            source = source.replace(pattern, replacement);
          }
          source = source.replace(/Updated 3\. Mai 2026/g, 'Updated 12. Juni 2026');
          writeFileSync(scriptPath, source);
          NODE

      - name: Commit refreshed meta data
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No meta changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "New project 2/data/wzstats-meta.json" "New project 2/data/latest-updates.json" "New project 2/data/cod-weapons.json" "New project 2/data/mw4-watch.json" "New project 2/data/season-watch.json" "New project 2/index.html" "New project 2/script.js"
          git commit -m "Update Loadout Lab meta weapons"
          git push
